<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FUMUGOLD — Omni Gateway v8.0</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@200;400;600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; cursor:none; }
:root {
  --gold-pure: #D4AF37; --gold-bright: #FFD700; --gold-deep: #996515;
  --vanta: #010101; --glass: rgba(5, 5, 5, 0.5);
}
html, body { width:100%; height:100%; overflow:hidden; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; }

#canvas-container { position:fixed; inset:0; z-index:0; }

#cd { position:fixed; z-index:9999; width:6px; height:6px; background:var(--gold-bright); border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; box-shadow: 0 0 15px var(--gold-pure); }
#cr { position:fixed; z-index:9998; width:40px; height:40px; border:1px solid var(--gold-deep); border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1); }

#header { position:fixed; top:40px; left:50px; z-index:50; opacity:0; }
.logo { font-family:'Bebas Neue'; font-size:28px; letter-spacing:0.4em; color:var(--gold-pure); text-shadow: 0 0 30px rgba(212,175,55,0.5); }
.sub { font-size:8px; letter-spacing:0.5em; color:var(--gold-deep); text-transform:uppercase; margin-top:5px; font-weight:600; }

#panel {
  position:fixed; top:50%; left:50%; transform:translate(-50%, -50%) perspective(1000px); z-index:40;
  width:440px; padding:60px; opacity:0;
  background: rgba(10, 10, 10, 0.6);
  border: 1px solid rgba(212, 175, 55, 0.25);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border-radius: 1px;
  box-shadow: 0 50px 100px rgba(0,0,0,0.9);
}
#panel::before {
  content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
  background: linear-gradient(90deg, transparent, var(--gold-bright), transparent);
  box-shadow: 0 0 15px var(--gold-pure);
}

.p-title { font-family: 'Playfair Display', serif; font-size:48px; color:#fff; line-height:1; margin-bottom:10px; font-weight:300; }
.p-title em { color: var(--gold-pure); font-style:italic; }
.p-desc { font-size:9px; letter-spacing:0.3em; color: var(--gold-deep); text-transform:uppercase; margin-bottom:40px; border-bottom: 1px solid rgba(212,175,55,0.1); padding-bottom:20px; font-weight:600; }

.f-group { position:relative; margin-bottom:35px; opacity:0; transform:translateY(10px); }
.f-label { display:block; font-size:8px; letter-spacing:0.2em; color:var(--gold-deep); text-transform:uppercase; margin-bottom:10px; font-weight:600; }
.f-input { 
  width:100%; background:transparent; border:none; border-bottom:1px solid rgba(212,175,55,0.2);
  color:var(--gold-bright); font-size:15px; padding:10px 0; outline:none; transition:0.4s; font-family:'Plus Jakarta Sans'; font-weight:300;
}
.f-input:focus { border-bottom-color: var(--gold-pure); background: rgba(212,175,55,0.03); }

.f-btn {
  width:100%; padding:22px; border:1px solid var(--gold-pure); background:transparent; color:var(--gold-pure);
  font-family:'Bebas Neue'; font-size:18px; letter-spacing:0.4em; cursor:none; transition: 0.5s; overflow:hidden; position:relative; opacity:0; transform:translateY(10px);
}
.f-btn:hover { background: var(--gold-pure); color: #000; box-shadow: 0 0 40px rgba(212,175,55,0.4); letter-spacing: 0.5em; }

#loader { position:fixed; inset:0; background:#000; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.l-text { font-family:'Bebas Neue'; font-size:30px; letter-spacing:0.6em; color:var(--gold-pure); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity:0.3; } 50% { opacity:1; } }

#warp-status {
  position:fixed; bottom:10vh; left:50%; transform:translateX(-50%);
  z-index:90; opacity:0; pointer-events:none;
  font-family:'Bebas Neue'; font-size:12px; letter-spacing:1em;
  color:var(--gold-bright); text-transform:uppercase;
  animation: warp-blink 0.8s steps(2) infinite;
  text-shadow: 0 0 10px var(--gold-pure);
}
#warp-status.active { opacity:1; transition: opacity 1s ease 1s; }
@keyframes warp-blink { to { visibility:hidden; } }

#root { display: none; }
</style>
</head>
<body>

<div id="loader"><div class="l-text">FUMUGOLD</div></div>

<div id="canvas-container"></div>

<div id="cd"></div><div id="cr"></div>

<div id="header">
  <div class="logo">FUMUGOLD</div>
  <div class="sub">Clinical System v8.0 Gateway</div>
</div>

<div id="panel">
  <div class="p-title">Imperial<br><em>Access</em></div>
  <div class="p-desc">Protocolo de Segurança Ativo • Angola 2025</div>
  
  <div class="f-group u-anim">
    <label class="f-label">Identificação de Elite</label>
    <input type="text" class="f-input" placeholder="OPERADOR_OURO" id="uid">
  </div>
  
  <div class="f-group u-anim">
    <label class="f-label">Cripto-Chave Neural</label>
    <input type="password" class="f-input" placeholder="••••••••••••" id="pwd">
  </div>
  
  <button class="f-btn u-anim" id="btn-login"><span>Entrar no Sistema</span></button>
</div>

<div id="warp-status">FTL JUMP ACTIVE • REDIRECTING</div>

<div id="root"></div>

<script type="module" src="/src/main.jsx"></script>

<script>
function hasValidSession(){
  try{
    const sb=JSON.parse(localStorage.getItem('fg_sb_auth')||'null');
    if(sb?.access_token&&sb?.expires_at&&Date.now()<sb.expires_at*1000)return true;
  }catch{}
  try{
    const dev=JSON.parse(localStorage.getItem('fg_session')||'null');
    if(dev?._dev&&dev?.createdAt&&(Date.now()-dev.createdAt)<28800000)return true;
  }catch{}
  return false;
}
const urlParams=new URLSearchParams(window.location.search);
const showApp=urlParams.get('app')==='true'||hasValidSession();

if(showApp){
  window.history.replaceState({},document.title,window.location.pathname);
  ['loader','canvas-container','panel','header','cd','cr'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.display='none';
  });
  document.getElementById('root').style.display='block';
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
} else {
  window.location.replace('./login.html');
}
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.01);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 18;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
document.getElementById('canvas-container').appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambient);

const frontLight = new THREE.DirectionalLight(0xffffff, 2.5);
frontLight.position.set(2, 5, 10);
scene.add(frontLight);

const fillLight = new THREE.PointLight(0xD4AF37, 1.5, 30);
fillLight.position.set(-8, -5, 5);
scene.add(fillLight);

const pmremGenerator = new THREE.PMREMGenerator(renderer);
(() => {
  const ew=256, eh=128, d=new Float32Array(ew*eh*4);
  for(let y=0;y<eh;y++) for(let x=0;x<ew;x++){
    const i=(y*ew+x)*4, u=x/ew, v=y/eh;
    const k=Math.exp(-((u-.2)**2+(v-.3)**2)*20)*2;
    const f=Math.exp(-((u-.7)**2+(v-.6)**2)*15)*1.5;
    d[i]=k*1.1+f*.8; d[i+1]=k*.85+f*.85; d[i+2]=k*.2+f*.9; d[i+3]=1;
  }
  const t=new THREE.DataTexture(d,ew,eh,THREE.RGBAFormat,THREE.FloatType);
  t.mapping=THREE.EquirectangularReflectionMapping; t.needsUpdate=true;
  scene.environment = pmremGenerator.fromEquirectangular(t).texture;
  t.dispose(); pmremGenerator.dispose();
})();

const goldMat = new THREE.MeshPhysicalMaterial({
  color: 0xD4AF37, metalness: 1.0, roughness: 0.08,
  clearcoat: 1.0, clearcoatRoughness: 0.05,
  emissive: 0x442200, emissiveIntensity: 0.4,
  envMapIntensity: 2.5
});

function createDNA(x) {
  const group = new THREE.Group();
  for (let i = 0; i < 60; i++) {
    const t = i / 60;
    const angle = t * Math.PI * 6;
    const y = (t - 0.5) * 15;
    const s1 = new THREE.Mesh(new THREE.SphereGeometry(0.2, 24, 24), goldMat);
    s1.position.set(Math.cos(angle)*2, y, Math.sin(angle)*2); group.add(s1);
    const s2 = new THREE.Mesh(new THREE.SphereGeometry(0.2, 24, 24), goldMat);
    s2.position.set(Math.cos(angle + Math.PI)*2, y, Math.sin(angle + Math.PI)*2); group.add(s2);
    if (i%2===0) {
      const line = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 4), goldMat);
      line.position.set(0, y, 0); line.rotation.z = Math.PI/2; line.rotation.y = -angle; group.add(line);
    }
  }
  group.position.x = x; return group;
}
const dnaL = createDNA(-6); const dnaR = createDNA(6);
scene.add(dnaL, dnaR);

const starCount = 6000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
for(let i=0; i < starCount * 3; i++) {
  starPos[i] = (Math.random() - 0.5) * 120;
  if(i%3 === 2) starPos[i] = Math.random() * -1000;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({
  color: 0xffffff, size: 0.25, transparent: true, opacity: 0,
  blending: THREE.AdditiveBlending, sizeAttenuation: true
});
const starField = new THREE.Points(starGeo, starMat);
scene.add(starField);

let mX = 0, mY = 0;
let isFTL = false;
let warpAcceleration = 0.01;

document.addEventListener('mousemove', (e) => {
  mX = (e.clientX - window.innerWidth/2) * 0.005;
  mY = (e.clientY - window.innerHeight/2) * 0.005;
  gsap.to("#cd", { x: e.clientX, y: e.clientY, duration: 0 });
  gsap.to("#cr", { x: e.clientX, y: e.clientY, duration: 0.2 });
});

function animate() {
  requestAnimationFrame(animate);
  const t = Date.now() * 0.001;
  
  camera.position.x += (mX - camera.position.x) * 0.05;
  camera.position.y += (-mY - camera.position.y) * 0.05;
  
  if (isFTL) {
    warpAcceleration = THREE.MathUtils.lerp(warpAcceleration, 25, 0.01);
    
    const positions = starField.geometry.attributes.position.array;
    for(let i=0; i < starCount; i++) {
      positions[i*3 + 2] += warpAcceleration;
      if(positions[i*3 + 2] > 20) {
        positions[i*3 + 2] = -1000;
        positions[i*3] = (Math.random() - 0.5) * 120;
        positions[i*3+1] = (Math.random() - 0.5) * 120;
      }
    }
    starField.geometry.attributes.position.needsUpdate = true;
    
    camera.fov = THREE.MathUtils.lerp(camera.fov, 140, 0.005); 
    camera.updateProjectionMatrix();

  } else {
    dnaL.rotation.y = t * 0.3; dnaR.rotation.y = -t * 0.3;
    dnaL.position.y = Math.sin(t*0.5)*0.3; dnaR.position.y = Math.cos(t*0.5)*0.3;
  }
  
  camera.lookAt(0,0,0);
  renderer.render(scene, camera);
}
animate();

window.onload = () => {
  gsap.to("#loader", { opacity: 0, duration: 1.5, display: "none" });
  const tl = gsap.timeline();
  tl.to("#header", { opacity: 1, y: 0, duration: 1 })
    .to("#panel", { opacity: 1, scale: 1, duration: 1.2, ease: "expo.out" }, "-=0.5")
    .to(".u-anim", { opacity: 1, y: 0, stagger: 0.15, duration: 0.8, ease:"back.out(1.7)" }, "-=0.8");
};

document.addEventListener('mousemove', e => {
  const rx=(window.innerWidth/2-e.pageX)/35, ry=(window.innerHeight/2-e.pageY)/35;
  gsap.to("#panel", { rotateY:rx, rotateX:-ry, duration: 0.6 });
});

document.querySelectorAll('input, button').forEach(el => {
  el.addEventListener('mouseenter', ()=>document.getElementById('cr').style.width='55px');
  el.addEventListener('mouseleave', ()=>document.getElementById('cr').style.width='40px');
});

function doLogin() {
  const uid = document.getElementById('uid').value.trim();
  const btn = document.getElementById('btn-login');

  if(uid === "") {
    gsap.to("#panel", {x:10, duration:0.1, yoyo:true, repeat:3, onComplete:()=>gsap.set("#panel",{x:0})});
    return;
  }

  btn.innerHTML = "<span>VERIFICANDO CHAVE NEURAL...</span>";
  btn.style.borderColor = "#fff";
  gsap.to(goldMat, { emissiveIntensity: 2, duration: 0.2, yoyo:true, repeat:3 });

  setTimeout(() => {
    btn.innerHTML = "<span>ACESSO AUTORIZADO • BEM-VINDO</span>";
    btn.style.background = "var(--gold-pure)";
    btn.style.color = "#000";

    const tl = gsap.timeline();
    tl.to("#panel", { opacity: 0, scale: 1.3, duration: 1, ease: "expo.in" }, "+=0.5")
      .to("#header", { opacity: 0, y: -20, duration: 0.7 }, "-=0.8")
      .to(goldMat, { emissiveIntensity: 0, opacity: 0, duration: 0.8 }, "-=0.3")
      .add(() => {
        isFTL = true;
        dnaL.visible = dnaR.visible = false;
        document.getElementById('warp-status').classList.add('active');
      }, "-=0.3")
      .to(starMat, { opacity: 1, duration: 0.3 }, "-=0.2")
      .add(() => {
        setTimeout(() => {
          window.location.href = window.location.pathname + "?app=true";
        }, 4000); 
      }, "+=1");

  }, 1800);
}

document.getElementById('btn-login').addEventListener('click', doLogin);
document.querySelectorAll('input').forEach(i=>i.addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();}));

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
}
</script>
</body>
</html>
